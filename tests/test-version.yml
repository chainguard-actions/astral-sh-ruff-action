name: Test explicit version input
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          args: check
          src: ${{ github.workspace }}/actions/hardened/astral-sh--ruff-action/v4.0.0/tests/fixtures/sample.py
          version: "0.11.0"
      - name: Assert ruff-version matches requested version
        env:
          ACTUAL: ${{ steps.action.outputs.ruff-version }}
        run: |
          echo "ruff-version: $ACTUAL"
          if [ "$ACTUAL" != "0.11.0" ]; then
            echo "FAIL: expected ruff-version '0.11.0', got '$ACTUAL'"
            exit 1
          fi
          echo "PASS: ruff-version=$ACTUAL"
