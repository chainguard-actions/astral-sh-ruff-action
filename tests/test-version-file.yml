name: Test version-file input
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          args: "check"
          version-file: "${{ github.workspace }}/actions/hardened/astral-sh--ruff-action/v3.5.1/tests/fixtures/pyproject.toml"
          src: "."
      - name: Assert ruff-version output is set
        env:
          ACTUAL: ${{ steps.action.outputs.ruff-version }}
        run: |
          echo "actual: $ACTUAL"
          if [ -z "$ACTUAL" ]; then
            echo "FAIL: ruff-version output was empty"
            exit 1
          fi
          echo "PASS: ruff-version=$ACTUAL"
      - name: Assert ruff version matches pyproject.toml
        env:
          ACTUAL: ${{ steps.action.outputs.ruff-version }}
        run: |
          echo "actual: $ACTUAL"
          if [ "$ACTUAL" != "0.9.0" ]; then
            echo "FAIL: expected ruff version '0.9.0' from version-file, got '$ACTUAL'"
            exit 1
          fi
          echo "PASS: version-file correctly resolved ruff version to $ACTUAL"
