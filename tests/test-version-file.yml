name: Test version-file input
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Create pyproject.toml with ruff version and Python source
        run: |
          mkdir -p "$GITHUB_WORKSPACE/test-vf"
          cat > "$GITHUB_WORKSPACE/test-vf/pyproject.toml" << 'EOF'
          [tool.ruff]
          # ruff version pinned below

          [dependency-groups]
          dev = ["ruff==0.5.0"]
          EOF
          cat > "$GITHUB_WORKSPACE/test-vf/hello.py" << 'EOF'
          x = 1
          print(x)
          EOF

      - id: action
        uses: .
        with:
          version-file: "${{ github.workspace }}/test-vf/pyproject.toml"
          args: "check"
          src: "${{ github.workspace }}/test-vf"

      - name: Assert ruff-version output is set
        env:
          RUFF_VERSION: ${{ steps.action.outputs.ruff-version }}
        run: |
          echo "ruff-version: $RUFF_VERSION"
          if [ -z "$RUFF_VERSION" ]; then
            echo "FAIL: ruff-version output is empty"
            exit 1
          fi
          echo "PASS: ruff ran with version-file, version=$RUFF_VERSION"
