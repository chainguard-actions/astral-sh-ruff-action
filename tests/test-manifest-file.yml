name: Test manifest-file input
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      # Use a deliberately invalid manifest URL to verify the input is accepted and processed.
      # The action should fail trying to fetch the manifest (not with "unknown input" error).
      - id: action
        uses: .
        continue-on-error: true
        with:
          args: check
          src: ${{ github.workspace }}/actions/hardened/astral-sh--ruff-action/v4.0.0/tests/fixtures/sample.py
          version: "0.11.0"
          manifest-file: "https://invalid.example.invalid/manifest.json"
      - name: Assert action failed due to invalid manifest (not unknown input)
        env:
          OUTCOME: ${{ steps.action.outcome }}
        run: |
          echo "outcome: $OUTCOME"
          if [ "$OUTCOME" != "failure" ]; then
            echo "FAIL: expected action to fail with invalid manifest-file, got outcome=$OUTCOME"
            exit 1
          fi
          echo "PASS: action correctly processed manifest-file input and failed on invalid URL"
