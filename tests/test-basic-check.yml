name: Test basic ruff check
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Create a clean Python file
        run: |
          mkdir -p /tmp/ruff-test
          cat > /tmp/ruff-test/clean.py << 'EOF'
          x = 1
          y = 2
          z = x + y
          print(z)
          EOF

      - id: action
        uses: .
        with:
          args: "check"
          src: "/tmp/ruff-test"

      - name: Assert ruff-version output is set
        env:
          ACTUAL: ${{ steps.action.outputs.ruff-version }}
        run: |
          echo "actual ruff-version: $ACTUAL"
          if [ -z "$ACTUAL" ]; then
            echo "FAIL: expected ruff-version output to be non-empty"
            exit 1
          fi
          echo "PASS: ruff-version=$ACTUAL"
