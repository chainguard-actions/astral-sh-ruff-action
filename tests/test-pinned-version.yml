name: Test pinned ruff version
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Create a clean Python file
        run: |
          mkdir -p /tmp/ruff-pinned-test
          cat > /tmp/ruff-pinned-test/hello.py << 'EOF'
          def hello():
              print("hello world")


          hello()
          EOF

      - id: action
        uses: .
        with:
          args: check
          src: /tmp/ruff-pinned-test
          version: "0.6.0"

      - name: Assert ruff-version matches pinned version
        env:
          RUFF_VERSION: ${{ steps.action.outputs.ruff-version }}
        run: |
          echo "ruff-version: $RUFF_VERSION"
          if [ -z "$RUFF_VERSION" ]; then
            echo "FAIL: ruff-version output is empty"
            exit 1
          fi
          if [ "$RUFF_VERSION" != "0.6.0" ]; then
            echo "FAIL: expected ruff-version '0.6.0', got '$RUFF_VERSION'"
            exit 1
          fi
          echo "PASS: ruff-version=$RUFF_VERSION"
