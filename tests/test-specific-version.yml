name: Test specific ruff version
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Create a clean Python file
        run: |
          mkdir -p /tmp/ruff-version-test
          cat > /tmp/ruff-version-test/sample.py << 'EOF'
          x = 1
          print(x)
          EOF

      - id: action
        uses: .
        with:
          args: "check"
          src: "/tmp/ruff-version-test"
          version: "0.6.0"

      - name: Assert ruff-version output matches requested version
        env:
          ACTUAL: ${{ steps.action.outputs.ruff-version }}
        run: |
          echo "actual ruff-version: $ACTUAL"
          if [ -z "$ACTUAL" ]; then
            echo "FAIL: expected ruff-version output to be non-empty"
            exit 1
          fi
          if [ "$ACTUAL" != "0.6.0" ]; then
            echo "FAIL: expected ruff-version to be '0.6.0', got '$ACTUAL'"
            exit 1
          fi
          echo "PASS: ruff-version=$ACTUAL"
