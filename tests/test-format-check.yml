name: Test ruff format check
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Create a well-formatted Python file
        run: |
          mkdir -p /tmp/ruff-format-test
          cat > /tmp/ruff-format-test/formatted.py << 'EOF'
          def hello(name):
              return f"Hello, {name}!"


          result = hello("world")
          print(result)
          EOF

      - id: action
        uses: .
        with:
          args: "format --check"
          src: "/tmp/ruff-format-test"

      - name: Assert ruff-version output is set
        env:
          ACTUAL: ${{ steps.action.outputs.ruff-version }}
        run: |
          echo "actual ruff-version: $ACTUAL"
          if [ -z "$ACTUAL" ]; then
            echo "FAIL: expected ruff-version output to be non-empty"
            exit 1
          fi
          echo "PASS: ruff-version=$ACTUAL"
