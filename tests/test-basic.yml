name: Test basic usage - ruff check
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Create a clean Python file to lint
        run: |
          mkdir -p "$GITHUB_WORKSPACE/test-src"
          cat > "$GITHUB_WORKSPACE/test-src/hello.py" << 'EOF'
          x = 1
          y = 2
          print(x + y)
          EOF

      - id: action
        uses: .
        with:
          args: "check"
          src: "${{ github.workspace }}/test-src"

      - name: Assert ruff-version output is set
        env:
          RUFF_VERSION: ${{ steps.action.outputs.ruff-version }}
        run: |
          echo "ruff-version: $RUFF_VERSION"
          if [ -z "$RUFF_VERSION" ]; then
            echo "FAIL: ruff-version output is empty"
            exit 1
          fi
          echo "PASS: ruff-version=$RUFF_VERSION"
