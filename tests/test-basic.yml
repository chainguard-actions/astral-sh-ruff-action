name: Test basic usage
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          args: check
          src: ${{ github.workspace }}/actions/hardened/astral-sh--ruff-action/v3.5.0/tests/fixtures/sample.py
      - name: Assert ruff-version output is set
        env:
          RUFF_VERSION: ${{ steps.action.outputs.ruff-version }}
        run: |
          echo "ruff-version: $RUFF_VERSION"
          if [ -z "$RUFF_VERSION" ]; then
            echo "FAIL: ruff-version output is empty"
            exit 1
          fi
          echo "PASS"
