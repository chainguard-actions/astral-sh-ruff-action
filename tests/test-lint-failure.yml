name: Test lint failure detection
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Create a Python file with lint errors (unused import)
        run: |
          mkdir -p /tmp/ruff-bad-src
          cat > /tmp/ruff-bad-src/bad.py << 'EOF'
          import os
          x=1
          print(x)
          EOF

      - id: action
        uses: .
        with:
          args: check
          src: /tmp/ruff-bad-src
        continue-on-error: true

      - name: Assert action failed due to lint errors
        env:
          OUTCOME: ${{ steps.action.outcome }}
        run: |
          echo "action outcome: $OUTCOME"
          if [ "$OUTCOME" != "failure" ]; then
            echo "FAIL: expected action to fail on lint errors, but outcome was '$OUTCOME'"
            exit 1
          fi
          echo "PASS: action correctly failed on lint errors"
